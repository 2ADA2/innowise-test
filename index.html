<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="icon" href="/assets/favicon.svg">
</head>
<body>

<header>
  <div class="logo"><img src="/assets/white-book-svgrepo-com.svg"></div>
  <div>
    <div class="title">The Library</div>
    <div class="subtitle">Discover your next favorite book</div>
  </div>
</header>

<section class="hero">
  <h1>Discover Your Next Great Read</h1>
  <p>Search millions of books, build your personal library, and never lose track of what to read next.</p>
  <div class="search">
    <input id="search-field" type="text" placeholder="Search for books by title or author...">
    <input id="filter-field" type="text" placeholder="filter by author...">
  </div>
</section>

<div class="container">
  <div id="catalogue">
  </div>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="fav-icon">
        <img src="public/assets/favorite.svg">
      </div>
      <div>
        <h3>Favorites</h3>
        <span id="fav-info"></span>
      </div>
    </div>
    <div class = "sidebar-body" id="fav">
    </div>
  </aside>
</div>

<footer>
  Powered by Open Library
</footer>

<script src="src/scripts/main.js" type="module"></script>
<script src="src/scripts/search.js" type="module"></script>

</body>
</html>
